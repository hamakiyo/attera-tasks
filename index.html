<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attera Tasks - SaaS Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; transition: background-color 0.3s; }
        
        body.theme-kiyo { background-color: #0079bf; }
        body.theme-yamada { background-color: #00897b; }
        body.theme-suzuki { background-color: #8e24aa; }
        body.theme-all { background-color: #455a64; }

        .kanban-col::-webkit-scrollbar { width: 6px; }
        .kanban-col::-webkit-scrollbar-track { background: transparent; }
        .kanban-col::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 4px; }
        .board-container::-webkit-scrollbar { height: 10px; }
        .board-container::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 6px; }
        .board-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.4); border-radius: 6px; }

        .task-card { transition: all 0.2s ease, transform 0.1s; }
        .task-card:hover { border-color: #cbd5e1; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .task-card:active { transform: scale(0.99); }
        
        .drag-handle { cursor: grab; color: #cbd5e1; transition: all 0.2s; }
        .drag-handle:hover { color: #64748b; background-color: #f1f5f9; }
        .drag-handle:active { cursor: grabbing; background-color: #e2e8f0; }

        .sortable-ghost { opacity: 0.3; background-color: #f1f5f9; border: 2px dashed #94a3b8; }
        
        .task-done { opacity: 0.6; background-color: #f8fafc; }
        .task-done h4 { text-decoration: line-through; color: #64748b; }
        .nav-item.active { background-color: rgba(255,255,255,0.1); border-left: 4px solid #fff; }
        
        /* Loading Overlay */
        #loading-overlay { backdrop-filter: blur(4px); }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-800 theme-kiyo" id="app-body">

    <!-- Sidebar -->
    <aside class="w-64 bg-gray-900 text-white flex flex-col shadow-xl z-20 flex-shrink-0">
        <div class="p-4 border-b border-gray-800 flex items-center space-x-3">
            <div class="bg-white/20 p-1.5 rounded-md backdrop-blur-sm">
                <i class="fas fa-check-double text-white text-lg"></i>
            </div>
            <h1 class="text-lg font-bold tracking-wider">Attera Tasks</h1>
        </div>
        
        <div class="p-4 flex-1">
            <p class="text-[10px] text-gray-400 font-semibold uppercase tracking-wider mb-2">ワークスペース</p>
            <nav class="space-y-1" id="user-nav">
                <a href="#" onclick="switchUser('kiyo', 'きよのり')" class="nav-item active flex items-center space-x-3 text-gray-300 hover:bg-gray-800 px-3 py-2 rounded-md font-medium transition text-sm" data-user="kiyo">
                    <i class="fas fa-inbox w-4 text-center"></i><span>マイトレイ (@kiyo)</span>
                </a>
                <div class="pt-4 pb-2">
                    <p class="text-[10px] text-gray-400 font-semibold uppercase tracking-wider mb-2">チームメンバー</p>
                    <a href="#" onclick="switchUser('yamada', '山田')" class="nav-item flex items-center space-x-3 text-gray-300 hover:bg-gray-800 px-3 py-2 rounded-md font-medium transition text-sm" data-user="yamada">
                        <i class="fas fa-user w-4 text-center"></i><span>山田 (@yamada)</span>
                    </a>
                    <a href="#" onclick="switchUser('suzuki', '鈴木')" class="nav-item flex items-center space-x-3 text-gray-300 hover:bg-gray-800 px-3 py-2 rounded-md font-medium transition text-sm" data-user="suzuki">
                        <i class="fas fa-user w-4 text-center"></i><span>鈴木 (@suzuki)</span>
                    </a>
                    <a href="#" onclick="switchUser('all', '全体ダッシュボード')" class="nav-item mt-2 border-t border-gray-800 pt-2 flex items-center space-x-3 text-gray-300 hover:bg-gray-800 px-3 py-2 rounded-md font-medium transition text-sm" data-user="all">
                        <i class="fas fa-globe w-4 text-center text-gray-400"></i><span>全員表示 (Dashboard)</span>
                    </a>
                </div>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative min-w-0">
        
        <!-- Header -->
        <header class="bg-white/10 backdrop-blur-md px-5 py-2.5 flex justify-between items-center shadow-sm">
            <div class="flex items-center space-x-3">
                <h2 class="text-lg font-bold text-white tracking-wide" id="header-title">マイトレイ - きよのり</h2>
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="fetchTasks()" class="text-xs flex items-center space-x-1 px-3 py-1.5 bg-white/10 hover:bg-white/20 text-white rounded transition font-medium border border-white/20" title="最新データを再読み込み">
                    <i class="fas fa-sync-alt" id="sync-icon"></i><span class="hidden sm:inline">同期</span>
                </button>
            </div>
        </header>

        <!-- Kanban Board Area -->
        <div class="flex-1 overflow-x-auto board-container p-4 flex items-start space-x-3">
            
            <!-- List: Today / Past Due -->
            <div class="bg-gray-100 rounded-lg w-[260px] flex-shrink-0 max-h-full flex flex-col shadow-sm border border-gray-200">
                <div class="px-3 py-2 border-b border-gray-200 flex justify-between items-center bg-gray-100 rounded-t-lg">
                    <h3 class="font-bold text-gray-700 text-xs flex items-center">
                        <span class="w-2 h-2 rounded-full bg-red-500 mr-1.5"></span>今日やる・超過
                    </h3>
                    <span class="bg-gray-200 text-gray-600 text-[10px] font-bold px-1.5 py-0.5 rounded-md" id="count-today">0</span>
                </div>
                <div id="list-today" class="p-1.5 flex-1 overflow-y-auto kanban-col space-y-1.5 min-h-[50px]"></div>
                <div class="p-1.5 bg-gray-100 rounded-b-lg border-t border-gray-200">
                    <button onclick="openModal('today')" class="w-full text-left text-gray-500 hover:text-gray-700 hover:bg-gray-200 px-2 py-1 rounded text-xs transition flex items-center font-medium">
                        <i class="fas fa-plus mr-1.5"></i>タスクを追加
                    </button>
                </div>
            </div>

            <!-- List: This Week -->
            <div class="bg-gray-100 rounded-lg w-[260px] flex-shrink-0 max-h-full flex flex-col shadow-sm border border-gray-200">
                <div class="px-3 py-2 border-b border-gray-200 flex justify-between items-center bg-gray-100 rounded-t-lg">
                    <h3 class="font-bold text-gray-700 text-xs flex items-center">
                        <span class="w-2 h-2 rounded-full bg-blue-500 mr-1.5"></span>今週 (This Week)
                    </h3>
                    <span class="bg-gray-200 text-gray-600 text-[10px] font-bold px-1.5 py-0.5 rounded-md" id="count-week">0</span>
                </div>
                <div id="list-week" class="p-1.5 flex-1 overflow-y-auto kanban-col space-y-1.5 min-h-[50px]"></div>
                <div class="p-1.5 bg-gray-100 rounded-b-lg border-t border-gray-200">
                    <button onclick="openModal('week')" class="w-full text-left text-gray-500 hover:text-gray-700 hover:bg-gray-200 px-2 py-1 rounded text-xs transition flex items-center font-medium">
                        <i class="fas fa-plus mr-1.5"></i>タスクを追加
                    </button>
                </div>
            </div>

            <!-- List: Later -->
            <div class="bg-gray-100 rounded-lg w-[260px] flex-shrink-0 max-h-full flex flex-col shadow-sm border border-gray-200">
                <div class="px-3 py-2 border-b border-gray-200 flex justify-between items-center bg-gray-100 rounded-t-lg">
                    <h3 class="font-bold text-gray-700 text-xs flex items-center">
                        <span class="w-2 h-2 rounded-full bg-gray-400 mr-1.5"></span>来週以降 (Later)
                    </h3>
                    <span class="bg-gray-200 text-gray-600 text-[10px] font-bold px-1.5 py-0.5 rounded-md" id="count-later">0</span>
                </div>
                <div id="list-later" class="p-1.5 flex-1 overflow-y-auto kanban-col space-y-1.5 min-h-[50px]"></div>
                <div class="p-1.5 bg-gray-100 rounded-b-lg border-t border-gray-200">
                    <button onclick="openModal('later')" class="w-full text-left text-gray-500 hover:text-gray-700 hover:bg-gray-200 px-2 py-1 rounded text-xs transition flex items-center font-medium">
                        <i class="fas fa-plus mr-1.5"></i>タスクを追加
                    </button>
                </div>
            </div>

            <!-- List: Done (Completed Today) -->
            <div class="bg-gray-200/80 rounded-lg w-[260px] flex-shrink-0 max-h-full flex flex-col shadow-sm border border-gray-300">
                <div class="px-3 py-2 border-b border-gray-300 flex justify-between items-center bg-gray-200/80 rounded-t-lg">
                    <h3 class="font-bold text-gray-600 text-xs flex items-center">
                        <i class="fas fa-check-circle text-green-600 mr-1.5"></i>完了 (本日)
                    </h3>
                    <span class="bg-gray-300 text-gray-600 text-[10px] font-bold px-1.5 py-0.5 rounded-md" id="count-done">0</span>
                </div>
                <div id="list-done" class="p-1.5 flex-1 overflow-y-auto kanban-col space-y-1.5 min-h-[50px]"></div>
                <div class="p-2 text-center border-t border-gray-300">
                    <p class="text-[9px] text-gray-500">誤操作時は他列へドラッグで戻せます</p>
                </div>
            </div>
            <div class="w-4 flex-shrink-0"></div>
        </div>
    </main>

    <!-- Modal: Task Detail & Edit -->
    <div id="task-modal" class="fixed inset-0 bg-gray-900/60 z-50 hidden flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
            <div class="px-5 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <div class="flex items-center text-gray-500 text-xs font-bold">
                    <i class="fas fa-list-alt mr-1.5"></i><span id="modal-header-text">タスク詳細</span>
                </div>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600 transition p-1"><i class="fas fa-times text-lg"></i></button>
            </div>
            
            <div class="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-5">
                <input type="hidden" id="modal-task-id" value="">
                <input type="hidden" id="modal-action-type" value="">
                
                <div>
                    <textarea id="modal-title" rows="2" class="w-full text-lg font-bold text-gray-800 border-none outline-none focus:ring-2 focus:ring-blue-500 rounded px-2 -ml-2 py-1 bg-transparent hover:bg-gray-100 resize-none" placeholder="タスク名"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">担当者</label>
                        <select id="modal-user" class="w-full text-sm border-none bg-gray-100 rounded p-2 outline-none">
                            <option value="kiyo">きよのり</option>
                            <option value="yamada">山田</option>
                            <option value="suzuki">鈴木</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase mb-1">期限</label>
                        <input type="date" id="modal-deadline" class="w-full text-sm border-none bg-gray-100 rounded p-2 outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-500 uppercase flex items-center mb-1.5">
                        <i class="fas fa-align-left mr-1.5"></i>メモ・詳細
                    </label>
                    <textarea id="modal-memo" rows="4" class="w-full text-sm border border-gray-200 rounded-lg p-3 focus:ring-2 focus:ring-blue-500 outline-none transition resize-none bg-gray-50" placeholder="タスクの詳細やメモを追加..."></textarea>
                </div>
            </div>
            <div class="px-5 py-3 bg-gray-50 border-t border-gray-100 flex justify-end space-x-2">
                <button onclick="closeModal()" class="px-4 py-1.5 text-xs font-medium text-gray-600 hover:bg-gray-200 rounded-md">キャンセル</button>
                <button id="btn-save" onclick="apiSaveTask()" class="px-4 py-1.5 text-xs font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-md shadow-sm flex items-center">
                    <i class="fas fa-save mr-1.5"></i><span>保存する</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Initial Loading Overlay -->
    <div id="loading-overlay" class="fixed inset-0 bg-gray-900/80 z-[100] flex flex-col items-center justify-center text-white">
        <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-4"></i>
        <h2 class="text-xl font-bold">データを読み込み中...</h2>
        <p class="text-sm text-gray-400 mt-2">スプレッドシート(DB)と同期しています</p>
    </div>

    <script>
        // ==========================================
        // 1. API 定義 & 状態管理 (SSOT)
        // ==========================================
        const API_URL = 'https://script.google.com/macros/s/AKfycbwISYX7iYopoK2bSnDlDV474y2Ak7F4Gsy-2EFh5YLd59B-_Ob7Gd43RaOjU50AKVOjfA/exec';
        let tasksDB = []; // スプレッドシートから取得した真のデータ
        let currentUser = 'kiyo';

        // ==========================================
        // 2. バックエンド通信ロジック (API/Fetch)
        // ==========================================
        
        // アプリ起動時の初期データ取得
        async function fetchTasks() {
            const syncIcon = document.getElementById('sync-icon');
            syncIcon.classList.add('fa-spin');
            
            try {
                // text/plainとして受信し、JSでパースする
                const response = await fetch(API_URL);
                const result = await response.json();
                
                if(result.status === 'success') {
                    tasksDB = result.data;
                    renderBoard();
                } else {
                    alert('データの取得に失敗しました: ' + result.message);
                }
            } catch (error) {
                console.error('通信エラー:', error);
                alert('通信エラーが発生しました。コンソールを確認してください。');
            } finally {
                syncIcon.classList.remove('fa-spin');
                document.getElementById('loading-overlay').classList.add('hidden');
            }
        }

        // タスクの保存 (新規作成 or 上書き更新)
        async function apiSaveTask() {
            const btn = document.getElementById('btn-save');
            const actionType = document.getElementById('modal-action-type').value; // 'addTask' or 'updateTask'
            
            // 入力データの取得
            const payloadData = {
                taskId: document.getElementById('modal-task-id').value,
                taskName: document.getElementById('modal-title').value,
                userId: document.getElementById('modal-user').value,
                deadline: document.getElementById('modal-deadline').value,
                memo: document.getElementById('modal-memo').value,
                status: 'today' // 新規作成時は便宜上today枠とする（日付判定は拡張可能）
            };

            if(!payloadData.taskName) { alert('タスク名を入力してください'); return; }

            // 連打防止のロック (UX)
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1.5"></i>保存中...';
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: actionType, data: payloadData })
                });
                const result = await response.json();
                
                if(result.status === 'success') {
                    closeModal();
                    await fetchTasks(); // DB更新後に最新データを再取得して再描画
                } else {
                    alert('保存に失敗しました: ' + result.message);
                }
            } catch (error) {
                console.error('保存エラー:', error);
                alert('保存中にエラーが発生しました。');
            } finally {
                // ロック解除
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        // ステータスの更新 (ドラッグ＆ドロップ、完了ボタン時にサイレント実行)
        async function apiUpdateStatus(taskId, newStatus) {
            console.log(`[API POST] TaskID: ${taskId} の状態を '${newStatus}' に更新します`);
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: 'updateStatus', 
                        data: { taskId: taskId, newStatus: newStatus } 
                    })
                });
                // 成功してもサイレント。失敗時のみエラーを出す。
            } catch (error) {
                console.error('ステータス更新エラー:', error);
            }
        }

        // ==========================================
        // 3. UI・レンダリングロジック
        // ==========================================

        function renderBoard() {
            const lists = {
                'today': document.getElementById('list-today'),
                'week': document.getElementById('list-week'),
                'later': document.getElementById('list-later'),
                'done': document.getElementById('list-done')
            };
            
            // 一旦全てクリア
            Object.values(lists).forEach(el => el.innerHTML = '');

            // 表示対象ユーザーのフィルタリング
            const filteredTasks = currentUser === 'all' 
                ? tasksDB 
                : tasksDB.filter(t => t.User_ID === currentUser);

            filteredTasks.forEach(task => {
                const cardHTML = createTaskCardHTML(task);
                // 過去の日付（past_due）の厳密な判定は省略し、Statusカラムに依存させる
                const targetList = lists[task.Status] || lists['later']; // 万が一不明なステータスならlaterへ
                targetList.insertAdjacentHTML('beforeend', cardHTML);
            });

            updateCounts();
        }

        function createTaskCardHTML(task) {
            const isDone = task.Status === 'done';
            // 今日より前かどうかの簡易判定 (UI上のバッジ用)
            const todayStr = new Date().toISOString().split('T')[0];
            const isPastDue = !isDone && (task.Deadline < todayStr);
            
            const cardClass = isDone ? 'task-done border-gray-200' : (isPastDue ? 'border-l-4 border-red-500' : 'border border-gray-200');
            const badge = isPastDue ? `<span class="bg-red-100 text-red-700 text-[9px] font-bold px-1 py-0.5 rounded leading-none mr-1.5">超過</span>` : '';
            const memoIcon = task.Memo ? `<i class="fas fa-align-left text-gray-400 mr-2"></i>` : '';
            const userTag = currentUser === 'all' ? `<span class="text-[9px] bg-gray-100 text-gray-500 px-1 py-0.5 rounded mr-1.5">@${task.User_ID}</span>` : '';

            const completeBtn = isDone ? '' : `
                <button onclick="event.stopPropagation(); triggerCompleteTask(this)" class="text-[10px] bg-white hover:bg-green-50 text-gray-400 hover:text-green-600 border border-gray-200 hover:border-green-300 rounded px-1.5 py-0.5 transition flex items-center h-5">
                    <i class="fas fa-check"></i>
                </button>`;

            // 文字列のエスケープ処理（安全のため）
            const safeName = task.Task_Name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
            const safeMemo = task.Memo.replace(/'/g, "\\'").replace(/"/g, '&quot;').replace(/\n/g, '\\n');

            // data-task-id属性を埋め込み、API通信のキーとする
            return `
            <div class="task-card bg-white rounded shadow-sm group ${cardClass} flex items-stretch cursor-pointer" data-task-id="${task.Task_ID}" onclick="openModal('edit', '${task.Task_ID}', '${safeName}', '${task.Deadline}', '${task.User_ID}', '${safeMemo}')">
                <div class="drag-handle w-5 flex-shrink-0 bg-gray-50 rounded-l flex items-center justify-center border-r border-gray-100" onclick="event.stopPropagation();" title="ドラッグして移動">
                    <i class="fas fa-grip-vertical text-gray-300 text-[10px]"></i>
                </div>
                
                <div class="flex-1 p-2 min-w-0">
                    <div class="flex justify-between items-start mb-1">
                        <div class="flex items-center">${badge}${userTag}</div>
                        <button class="text-gray-300 hover:text-gray-500 opacity-0 group-hover:opacity-100 transition" onclick="event.stopPropagation(); openModal('edit', '${task.Task_ID}', '${safeName}', '${task.Deadline}', '${task.User_ID}', '${safeMemo}')"><i class="fas fa-pen text-[10px]"></i></button>
                    </div>
                    <h4 class="text-xs font-semibold text-gray-800 leading-snug mb-2 line-clamp-2 break-words" title="${safeName}">${safeName}</h4>
                    <div class="flex justify-between items-end text-gray-400">
                        <div class="flex items-center text-[10px] font-medium">
                            <i class="far fa-clock mr-1"></i><span>${task.Deadline}</span>
                        </div>
                        <div class="flex items-center">
                            ${memoIcon}
                            ${completeBtn}
                        </div>
                    </div>
                </div>
            </div>`;
        }

        // --- インタラクション制御 ---
        
        function switchUser(userId, userName) {
            currentUser = userId;
            document.getElementById('header-title').innerText = userId === 'all' ? '全体ダッシュボード' : `マイトレイ - ${userName}`;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.querySelector(`[data-user="${userId}"]`).classList.add('active');
            document.getElementById('app-body').className = `flex h-screen overflow-hidden text-gray-800 theme-${userId}`;
            renderBoard();
        }

        // SortableJSの設定（ドラッグ＆ドロップ時のAPI連動）
        const sortOpts = {
            group: 'kanban', 
            animation: 150, 
            ghostClass: 'sortable-ghost',
            handle: '.drag-handle',
            onEnd: function (evt) {
                const card = evt.item;
                const toListId = evt.to.id; // 例: 'list-today'
                
                // 列IDからStatus文字列を抽出 ('list-today' -> 'today')
                const newStatus = toListId.replace('list-', ''); 
                const taskId = card.dataset.taskId;

                // 完了列へ移動した時の見た目の即時変更
                if (newStatus === 'done') {
                    card.classList.add('task-done', 'border-gray-200');
                    card.classList.remove('border-l-4', 'border-red-500');
                    const btn = card.querySelector('button .fa-check')?.parentElement;
                    if(btn) btn.style.display = 'none';
                } else {
                    card.classList.remove('task-done');
                    const btn = card.querySelector('button .fa-check')?.parentElement;
                    if(btn) btn.style.display = 'flex';
                }

                if(evt.to.id !== evt.from.id) {
                    updateCounts();
                    // 裏側でAPIへステータス更新を投げる
                    apiUpdateStatus(taskId, newStatus);
                }
            }
        };
        
        new Sortable(document.getElementById('list-today'), sortOpts);
        new Sortable(document.getElementById('list-week'), sortOpts);
        new Sortable(document.getElementById('list-later'), sortOpts);
        new Sortable(document.getElementById('list-done'), sortOpts);

        function updateCounts() {
            document.getElementById('count-today').innerText = document.getElementById('list-today').children.length;
            document.getElementById('count-week').innerText = document.getElementById('list-week').children.length;
            document.getElementById('count-later').innerText = document.getElementById('list-later').children.length;
            document.getElementById('count-done').innerText = document.getElementById('list-done').children.length;
        }

        // ボタンからの完了処理
        function triggerCompleteTask(btnElement) {
            const card = btnElement.closest('.task-card');
            const doneList = document.getElementById('list-done');
            const taskId = card.dataset.taskId;
            
            doneList.insertBefore(card, doneList.firstChild);
            card.classList.add('task-done', 'border-gray-200');
            card.classList.remove('border-l-4', 'border-red-500');
            btnElement.style.display = 'none';
            
            updateCounts();
            apiUpdateStatus(taskId, 'done'); // API送信
        }

        // モーダルの制御 (新規作成と編集の切り替え)
        const modal = document.getElementById('task-modal');
        
        function openModal(mode, id = '', title = '', date = '', user = '', memo = '') {
            document.getElementById('modal-title').value = title;
            document.getElementById('modal-deadline').value = date;
            document.getElementById('modal-user').value = user || (currentUser === 'all' ? 'kiyo' : currentUser);
            document.getElementById('modal-memo').value = memo;
            document.getElementById('modal-task-id').value = id;
            
            if(mode === 'edit') {
                document.getElementById('modal-header-text').innerText = 'タスク編集';
                document.getElementById('modal-action-type').value = 'updateTask';
            } else {
                // 新規作成 (modeには列IDが入る)
                document.getElementById('modal-header-text').innerText = '新規タスク登録';
                document.getElementById('modal-action-type').value = 'addTask';
                
                // 選択した列に応じてデフォルト期限日をセット
                const today = new Date();
                if(mode === 'week') today.setDate(today.getDate() + 3);
                else if(mode === 'later') today.setDate(today.getDate() + 10);
                
                document.getElementById('modal-deadline').valueAsDate = today;
            }
            
            modal.classList.remove('hidden');
        }

        function closeModal() { modal.classList.add('hidden'); }

        // ==========================================
        // 4. アプリケーション起動
        // ==========================================
        window.onload = () => {
            fetchTasks(); // 初回データロード開始
        };
    </script>
</body>
</html>
